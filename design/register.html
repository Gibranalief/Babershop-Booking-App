<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>The Midnight Atelier - Register</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-surface": "#e2e2e5",
              outline: "#8d90a2",
              "on-surface": "#e2e2e5",
              "surface-container-high": "#282a2c",
              background: "#121416",
              "on-secondary-fixed": "#071e27",
              "on-secondary": "#1e333c",
              "surface-container-low": "#1a1c1e",
              "surface-bright": "#38393c",
              "on-primary-fixed": "#001550",
              "primary-fixed": "#dce1ff",
              "secondary-container": "#374c56",
              "tertiary-fixed": "#ffe088",
              "on-error": "#690005",
              secondary: "#b4cad6",
              "error-container": "#93000a",
              primary: "#b6c4ff",
              "surface-variant": "#333537",
              "primary-container": "#2962ff",
              "outline-variant": "#434656",
              "on-background": "#e2e2e5",
              "primary-fixed-dim": "#b6c4ff",
              "secondary-fixed": "#cfe6f2",
              "surface-container-lowest": "#0c0e10",
              error: "#ffb4ab",
              "secondary-fixed-dim": "#b4cad6",
              "on-secondary-container": "#a6bcc7",
              "on-tertiary-fixed": "#241a00",
              "on-surface-variant": "#c3c5d8",
              "surface-dim": "#121416",
              "on-error-container": "#ffdad6",
              "inverse-on-surface": "#2f3133",
              "on-tertiary": "#3c2f00",
              "tertiary-container": "#cca730",
              "on-primary-container": "#f7f5ff",
              "inverse-primary": "#004ee8",
              "surface-container-highest": "#333537",
              "on-tertiary-fixed-variant": "#574500",
              "on-secondary-fixed-variant": "#354a53",
              "tertiary-fixed-dim": "#e9c349",
              "on-primary": "#002780",
              "on-primary-fixed-variant": "#003ab3",
              "on-tertiary-container": "#4f3d00",
              surface: "#121416",
              "surface-tint": "#b6c4ff",
              "surface-container": "#1e2022",
              tertiary: "#e9c349",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
      }
      .glass-panel {
        background: rgba(18, 20, 22, 0.7);
        backdrop-filter: blur(20px);
      }
    </style>
  </head>
  <body
    class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col"
  >
    <!-- TopAppBar -->
    <header
      class="bg-[#121416] dark:bg-zinc-950 flex justify-between items-center w-full px-6 py-4 docked full-width top-0 z-50"
    >
      <div
        class="text-2xl font-black tracking-tighter text-[#e2e2e5] dark:text-zinc-100 font-headline"
      >
        The Midnight Atelier
      </div>
      <div class="flex items-center gap-4">
        <button
          class="text-zinc-500 dark:text-zinc-400 hover:text-[#b6c4ff] transition-colors duration-300 scale-95 active:duration-150"
        >
          <span class="material-symbols-outlined" data-icon="help_outline"
            >help_outline</span
          >
        </button>
      </div>
    </header>
    <!-- Main Content Canvas -->
    <main
      class="flex-grow flex items-center justify-center p-6 relative overflow-hidden"
    >
      <!-- Abstract Background Element -->
      <div
        class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px]"
      ></div>
      <div
        class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-tertiary/5 rounded-full blur-[100px]"
      ></div>
      <!-- Registration Card -->
      <div class="w-full max-w-md z-10">
        <div
          class="surface-container-low rounded-xl overflow-hidden shadow-2xl relative"
        >
          <!-- Branding Accent -->
          <div
            class="h-1 w-full bg-gradient-to-r from-primary-container via-primary to-transparent"
          ></div>
          <div class="p-8 md:p-12">
            <!-- Headline Section -->
            <div class="mb-10 text-left">
              <h1
                class="font-headline text-4xl font-extrabold -tracking-tight text-on-surface mb-2"
              >
                Create Account
              </h1>
              <p class="text-on-surface-variant font-body text-sm">
                Join the elite circle of The Midnight Atelier.
              </p>
            </div>
            <!-- Form -->
            <form class="space-y-6">
              <!-- Name Field -->
              <div class="space-y-1.5">
                <label
                  class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-medium ml-1"
                  >Full Name</label
                >
                <div class="relative group">
                  <input
                    class="w-full bg-surface-container-lowest border-none outline outline-1 outline-outline-variant/15 rounded-md px-4 py-3 text-on-surface placeholder:text-zinc-600 focus:ring-0 focus:outline-outline-variant/50 transition-all duration-300"
                    placeholder="Alexander Thorne"
                    type="text"
                  />
                </div>
              </div>
              <!-- Email Field -->
              <div class="space-y-1.5">
                <label
                  class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-medium ml-1"
                  >Email Address</label
                >
                <div class="relative group">
                  <input
                    class="w-full bg-surface-container-lowest border-none outline outline-1 outline-outline-variant/15 rounded-md px-4 py-3 text-on-surface placeholder:text-zinc-600 focus:ring-0 focus:outline-outline-variant/50 transition-all duration-300"
                    placeholder="a.thorne@atelier.com"
                    type="email"
                  />
                </div>
              </div>
              <!-- Password Fields Row -->
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                  <label
                    class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-medium ml-1"
                    >Password</label
                  >
                  <input
                    class="w-full bg-surface-container-lowest border-none outline outline-1 outline-outline-variant/15 rounded-md px-4 py-3 text-on-surface placeholder:text-zinc-600 focus:ring-0 focus:outline-outline-variant/50 transition-all duration-300"
                    placeholder="••••••••"
                    type="password"
                  />
                </div>
                <div class="space-y-1.5">
                  <label
                    class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-medium ml-1"
                    >Confirm</label
                  >
                  <input
                    class="w-full bg-surface-container-lowest border-none outline outline-1 outline-outline-variant/15 rounded-md px-4 py-3 text-on-surface placeholder:text-zinc-600 focus:ring-0 focus:outline-outline-variant/50 transition-all duration-300"
                    placeholder="••••••••"
                    type="password"
                  />
                </div>
              </div>
              <!-- CTA Button -->
              <div class="pt-4">
                <button
                  class="w-full bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-headline font-bold py-4 rounded-md shadow-lg transform transition-all duration-300 active:scale-95 bg-gradient-to-b from-white/5 to-transparent"
                >
                  REGISTER
                </button>
              </div>
            </form>
            <!-- Footer -->
            <div
              class="mt-10 pt-6 border-t border-outline-variant/10 text-center"
            >
              <p class="text-on-surface-variant text-sm font-body">
                Already have an account?
                <a
                  class="text-primary font-semibold hover:underline decoration-1 underline-offset-4 ml-1"
                  href="#"
                  >Login</a
                >
              </p>
            </div>
          </div>
        </div>
        <!-- Social Proof / Artistic Overlap -->
        <div class="mt-8 flex justify-center items-center gap-8 opacity-40">
          <div class="h-[1px] w-12 bg-outline-variant/30"></div>
          <div
            class="font-label text-[10px] tracking-[0.2em] uppercase text-on-surface-variant"
          >
            Precision • Style • Service
          </div>
          <div class="h-[1px] w-12 bg-outline-variant/30"></div>
        </div>
      </div>
    </main>
    <!-- BottomNavBar (Hidden for transactional/focused journey as per mandate) -->
    <nav
      class="hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#121416]/70 dark:bg-zinc-950/70 backdrop-blur-xl shadow-[0_-12px_24px_rgba(0,0,0,0.4)]"
    >
      <div
        class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 px-6 py-1"
      >
        <span class="material-symbols-outlined" data-icon="login">login</span>
        <span class="font-label uppercase tracking-widest text-[10px]"
          >Login</span
        >
      </div>
      <div
        class="flex flex-col items-center justify-center bg-[#2962ff] text-white rounded-md px-6 py-1"
      >
        <span class="material-symbols-outlined" data-icon="person_add"
          >person_add</span
        >
        <span class="font-label uppercase tracking-widest text-[10px]"
          >Register</span
        >
      </div>
    </nav>
    <!-- Background texture simulation -->
    <div
      class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay"
    >
      <svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <filter id="noise">
          <feturbulence
            basefrequency="0.65"
            numoctaves="3"
            stitchtiles="stitch"
            type="fractalNoise"
          ></feturbulence>
        </filter>
        <rect filter="url(#noise)" height="100%" width="100%"></rect>
      </svg>
    </div>
  </body>
</html>
